<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Prop Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a28;--border:#2a2a3a;--text:#e0e0e8;--text2:#8888a0;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);padding:24px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.header h1{font-size:28px;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hstats{display:flex;gap:24px;font-family:'JetBrains Mono',monospace;font-size:13px}
.hstat{text-align:center}
.hstat .v{font-size:24px;font-weight:700;color:var(--green)}
.hstat .l{color:var(--text2);margin-top:2px}
.controls{display:flex;gap:8px;padding:16px 32px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2)}
.controls button{font-family:'Outfit',sans-serif;background:var(--bg3);color:var(--text2);border:1px solid var(--border);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s}
.controls button:hover{border-color:var(--green);color:var(--text)}
.controls button.active{background:var(--green);color:#000;border-color:var(--green)}
.search{font-family:'JetBrains Mono',monospace;background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:6px;font-size:13px;width:200px;margin-left:auto}
.search:focus{outline:none;border-color:var(--cyan)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;padding:20px 32px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;transition:all 0.2s;cursor:pointer}
.card:hover{border-color:var(--green);transform:translateY(-2px)}
.card.play{border-left:3px solid var(--green)}
.card.lean{border-left:3px solid var(--amber)}
.card.pass{border-left:3px solid var(--border);opacity:0.7}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-player{font-weight:700;font-size:16px}
.badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase}
.badge-play{background:var(--green);color:#000}
.badge-lean{background:var(--amber);color:#000}
.badge-pass{background:var(--bg3);color:var(--text2)}
.card-matchup{font-size:12px;color:var(--text2);margin-bottom:8px}
.card-line{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border-radius:6px;padding:8px 12px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;font-size:13px}
.dir-over{font-weight:700;font-size:14px;color:var(--green)}
.dir-under{font-weight:700;font-size:14px;color:var(--red)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px}
.metric{text-align:center;padding:6px 4px;background:var(--bg3);border-radius:4px}
.metric .mv{font-weight:700;font-size:14px}
.metric .ml{color:var(--text2);margin-top:2px}
.detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.8}
.card.expanded .detail{display:block}
.drow{display:flex;justify-content:space-between;padding:2px 0}
.dlbl{color:var(--text2)}
.dval{color:var(--text);font-family:'JetBrains Mono',monospace}
.gamebar{display:flex;gap:16px;padding:12px 32px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);flex-wrap:wrap;font-family:'JetBrains Mono',monospace}
.empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:16px}
@media(max-width:768px){.grid{grid-template-columns:1fr;padding:12px}.header,.controls{padding:16px}}
</style>
</head>
<body>
<div class="header">
  <h1>NBA Prop Intelligence</h1>
  <div class="hstats">
    <div class="hstat"><div class="v" id="hp">0</div><div class="l">PLAYS</div></div>
    <div class="hstat"><div class="v" id="hl" style="color:var(--amber)">0</div><div class="l">LEANS</div></div>
    <div class="hstat"><div class="v" id="ht" style="color:var(--text2)">0</div><div class="l">MARKETS</div></div>
    <div class="hstat"><div class="v" id="hr" style="color:var(--text2)">0%</div><div class="l">PASS RATE</div></div>
  </div>
</div>
<div class="gamebar" id="gamebar"></div>
<div class="controls">
  <button class="active" data-f="plays">Plays</button>
  <button data-f="leans">Leans</button>
  <button data-f="all">All</button>
  <button data-f="points">PTS</button>
  <button data-f="pra">PRA</button>
  <button data-f="rebounds">REB</button>
  <button data-f="assists">AST</button>
  <button data-f="threes">3PM</button>
  <button data-f="passes">Passes</button>
  <input type="text" class="search" placeholder="Search player..." id="q">
</div>

var ALL = (CARD.plays||[]).concat(CARD.leans||[]).concat(CARD.notable_passes||[]);
document.getElementById('hp').textContent = CARD.summary.plays;
document.getElementById('hl').textContent = CARD.summary.leans;
document.getElementById('ht').textContent = CARD.summary.total_markets;
document.getElementById('hr').textContent = CARD.summary.pass_rate + '%';
document.getElementById('gamebar').innerHTML = (CARD.summary.games_list||[]).map(function(g){return '<span>'+g+'</span>'}).join('');

var currentFilter = 'plays';
var searchTerm = '';

function render() {
  var grid = document.getElementById('grid');
  var items = [];
  if (currentFilter === 'plays') items = CARD.plays || [];
  else if (currentFilter === 'leans') items = CARD.leans || [];
  else if (currentFilter === 'all') items = ALL;
  else if (currentFilter === 'passes') items = CARD.notable_passes || [];
  else items = ALL.filter(function(i){return i.prop_type === currentFilter});

  if (searchTerm) {
    var s = searchTerm.toLowerCase();
    items = items.filter(function(i){return i.player.toLowerCase().indexOf(s)>=0 || i.team.toLowerCase().indexOf(s)>=0});
  }

  if (!items.length) {
    grid.innerHTML = '<div class="empty">No decisions match this filter</div>';
    return;
  }

  var html = '';
  for (var idx = 0; idx < items.length; idx++) {
    var item = items[idx];
    var dec = item.decision;
    var cls = dec==='play'?'play':dec==='lean'?'lean':'pass';
    var bcls = dec==='play'?'badge-play':dec==='lean'?'badge-lean':'badge-pass';
    var dcls = item.direction==='over'?'dir-over':'dir-under';
    var proj = item.projection.mean || '?';
    var sd = item.projection.stdev || '?';
    var edge = item.edge.edge_pct || 0;
    var hit = item.edge.hit_prob || 0;
    var conf = item.confidence.score || 0;
    var ev = item.edge.ev_primary || 0;
    var ctx = item.context || {};
    var trend = ctx.trend || {};
    var game = ctx.game || {};
    var mins = ctx.minutes || {};
    var ec = edge > 8 ? 'var(--green)' : edge > 4 ? 'var(--amber)' : 'var(--text2)';
    var evc = ev > 5 ? 'var(--green)' : 'var(--text2)';
    var bp = game.blowout_prob ? Math.round(game.blowout_prob * 100) : 0;
    var ur = ctx.usage_rate ? (ctx.usage_rate * 100).toFixed(1) : '?';
    var kf = item.sizing.kelly_fraction ? (item.sizing.kelly_fraction * 100).toFixed(2) : '0';
    var reasons = (item.reasons || []).join(', ');

    html += '<div class="card ' + cls + '" onclick="this.classList.toggle(\'expanded\')">';
    html += '<div class="card-top"><div><div class="card-player">' + item.player + '</div>';
    html += '<div class="card-matchup">' + item.matchup + ' &middot; ' + (item.prop_type||'').toUpperCase() + ' &middot; ' + (ctx.archetype||'') + '</div></div>';
    html += '<span class="badge ' + bcls + '">' + dec + '</span></div>';
    html += '<div class="card-line"><span class="' + dcls + '">' + (item.direction||'').toUpperCase() + ' ' + item.line.value + '</span>';
    html += '<span>proj ' + proj + ' &plusmn; ' + sd + '</span><span>' + (item.line.book||'') + '</span></div>';
    html += '<div class="metrics">';
    html += '<div class="metric"><div class="mv" style="color:' + ec + '">' + edge + '%</div><div class="ml">Edge</div></div>';
    html += '<div class="metric"><div class="mv">' + hit + '%</div><div class="ml">Hit</div></div>';
    html += '<div class="metric"><div class="mv">' + conf + '</div><div class="ml">Conf</div></div>';
    html += '<div class="metric"><div class="mv" style="color:' + evc + '">' + ev + '%</div><div class="ml">EV</div></div>';
    html += '</div>';
    html += '<div class="detail">';
    html += '<div class="drow"><span class="dlbl">Minutes</span><span class="dval">' + (mins.projected||'?') + ' (' + (mins.floor||'?') + '-' + (mins.ceiling||'?') + ')</span></div>';
    html += '<div class="drow"><span class="dlbl">Trend</span><span class="dval">' + (trend.classification||'?') + ' L5=' + (trend.last_5_avg||'?') + ' szn=' + (trend.season_avg||'?') + '</span></div>';
    html += '<div class="drow"><span class="dlbl">Matchup</span><span class="dval">fit=' + (ctx.matchup_fit||'?') + ' vs ' + (ctx.opponent_scheme||'?') + '</span></div>';
    html += '<div class="drow"><span class="dlbl">Game</span><span class="dval">' + (game.pace||'?') + ' pace &middot; spread ' + (game.spread||'?') + ' &middot; blowout ' + bp + '%</span></div>';
    html += '<div class="drow"><span class="dlbl">Usage</span><span class="dval">' + ur + '% &middot; ' + (ctx.role||'?') + '</span></div>';
    html += '<div class="drow"><span class="dlbl">Range</span><span class="dval">' + (item.projection.floor_10th||'?') + ' &mdash; ' + (item.projection.ceiling_90th||'?') + '</span></div>';
    html += '<div class="drow"><span class="dlbl">Sizing</span><span class="dval">' + (item.sizing.suggested_units||0) + 'u (Kelly ' + kf + '%)</span></div>';
    html += '<div class="drow"><span class="dlbl">Reasons</span><span class="dval">' + reasons + '</span></div>';
    html += '</div></div>';
  }
  grid.innerHTML = html;
}

document.querySelectorAll('.controls button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.controls button').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    currentFilter = btn.getAttribute('data-f');
    render();
  });
});
document.getElementById('q').addEventListener('input', function(e) {
  searchTerm = e.target.value;
  render();
});
render();
</script>
</body>
</html>
